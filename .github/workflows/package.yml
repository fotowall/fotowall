name: Package fotowall
on:
  repository_dispatch:
    types:
    - package-master
    - package-release
  push:
    paths-ignore: &path-ignore
    - doc/**
    - README.md
    - ".github/workflows/build.yml"
    - ".github/workflows/webassembly.yml"
    - ".pre-commit-config.yaml"
    branches:
    - master
    tags:
    - v*
  pull_request:
    paths-ignore: *path-ignore
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  working-directory:
    runs-on: ubuntu-latest
    steps:
    - name: Free-up space
      run: |
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/lib/android
  package-qt5:
    uses: jrl-umi3218/github-actions/.github/workflows/package-project.yml@master
    with:
      latest-cmake: true
      matrix: |
          {
            "dist": ["jammy", "noble"],
            "arch": ["amd64"]
          }
      head-repo: "arntanguy/head"
      stable-repo: "arntanguy/stable"
    secrets:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      GH_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
  package-qt6:
    uses: jrl-umi3218/github-actions/.github/workflows/package-project.yml@master
    with:
      latest-cmake: true
      matrix: |
          {
            "dist": ["resolute"],
            "arch": ["amd64"]
          }
      head-repo: "arntanguy/head"
      stable-repo: "arntanguy/stable"
      control-file: 'debian/control.qt6'
    secrets:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      GH_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}

  package-appimage:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: install dependencies
        if: matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake doxygen qtbase5-dev libqt5svg5-dev libqt5webkit5-dev
      - name: install dependencies (qt6)
        if: matrix.os == 'ubuntu-26.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake doxygen qt6-base-dev qt6-svg-dev
      - name: configure
        run: cmake . -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
      - name: build
        run: make -j`nproc`  install DESTDIR=AppDir
      - name: Configure AppImageBuilder.yml (qt5)
        if: matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-24.04'
        run: |
          sed "s|focal|`lsb_release -cs`|g" AppImageBuilder-qt5.yml > AppImageBuilder.yml
          if [[ "`lsb_release -cs`" == 'focal' ]]
          then
            sed -i "s|KEY_URL|http://keyserver.ubuntu.com/pks/lookup?op=get\&search=0x3b4fe6acc0b21f32|g" AppImageBuilder.yml
          elif [[ "`lsb_release -cs`" == 'jammy' ]]
          then
            sed -i "s|KEY_URL|http://keyserver.ubuntu.com/pks/lookup?op=get\&search=0x871920D1991BC93C|g" AppImageBuilder.yml
          elif [[ "`lsb_release -cs`" == 'noble' ]]
          then
            sed -i "s|KEY_URL|http://keyserver.ubuntu.com/pks/lookup?op=get\&search=0x871920D1991BC93C|g" AppImageBuilder.yml
          fi
          echo "Using the following AppImageBuilder.yml:"
          cat AppImageBuilder.yml
      - name: Configure AppImageBuilder.yml (qt6)
        if: matrix.os == 'ubuntu-26.04'
        run: |
          sed "s|noble|`lsb_release -cs`|g" AppImageBuilder-qt6.yml > AppImageBuilder.yml
          sed -i "s|KEY_URL|http://keyserver.ubuntu.com/pks/lookup?op=get\&search=0x871920D1991BC93C|g" AppImageBuilder.yml
          echo "Using the following AppImageBuilder.yml:"

      - name: Build AppImage
        uses: AppImageCrafters/build-appimage-action@master
        env:
          UPDATE_INFO: gh-releases-zsync|AppImageCrafters|fotowall|latest|*x86_64.AppImage.zsync
        with:
          recipe: AppImageBuilder.yml

      - name: Install and Authenticate Cloudsmith CLI
        if: github.ref == 'refs/heads/master' && github.repository == 'fotowall/fotowall'
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Push to Cloudsmith
        id: push
        if: github.ref == 'refs/heads/master' && github.repository == 'fotowall/fotowall'
        run: |
          cloudsmith push raw arntanguy/head "./Fotowall-latest-x86_64.AppImage" \
            --tags "`lsb_release -cs`" \
            --name "Fotowall-latest-x86_64-${{ matrix.os }}.AppImage" \
            --summary "Upload latest raw AppImage" \
            --description "See https://github.com/cloudsmith-io/action" \
            --version "${{ github.sha }}" \
            --republish
