name: Build Devcontainers

on:
  push:
    paths-ignore:
      # Changes to those files don't mandate running CI
      - ".github/workflows/package.yml"
      - ".github/workflows/build.yml"
      - "debian/**"
      - "README.md"
      - "doc/**"
      - ".pre-commit-config.yaml"
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build_devcontainers:
    runs-on: ubuntu-latest
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        container: [ "qt5-gcc", "qt6-emscripten", "qt6-gcc" ]
    steps:
    - name: Maximize build space
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo docker image prune --all --force
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pre-build dev container image
      if:  github.ref == 'refs/heads/master' && github.repository == 'fotowall/fotowall'
      uses: devcontainers/ci@v0.3
      with:
        # Not allowed in pull requests
        imageName: ghcr.io/fotowall/fotowall
        imageTag: ${{ matrix.container }}
        subFolder: .github/.devcontainer/${{ matrix.container }}
        configFile: .github/.devcontainer/${{ matrix.container }}/devcontainer.json
        cacheFrom: ghcr.io/fotowall/fotowall
        push: always


  build_webassembly:
    needs: build_devcontainers
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and run Dev Container task
      uses: devcontainers/ci@v0.3
      with:
        configFile: .devcontainer/qt6-emscripten/devcontainer.json
        push: never
        # Change this to be your CI task/script
        runCmd: |
          # Add multiple commands to run if needed
          mkdir build
          cd build
          qt-cmake -GNinja ..
          ninja

    - name: Bundle Webassembly Files
      run: |
        echo "::group::Bundle files"
        cd $GITHUB_WORKSPACE/build
        mkdir fotowall-webassembly
        cp fotowall.js fotowall.html fotowall.wasm qtloader.js qtlogo.svg fotowall-webassembly
        tar -czf fotowall-webassembly.tar.gz fotowall-webassembly
        cp -r fotowall-webassembly /home/runner/work/fotowall/fotowall
        echo "::endgroup::"
        echo "::group::List files"
        ls -R $GITHUB_WORKSPACE/build/fotowall-webassembly
        echo "::endgroup::"

    - name: Install and Authenticate Cloudsmith CLI
      if: github.ref == 'refs/heads/master' && github.repository == 'fotowall/fotowall'
      uses: cloudsmith-io/cloudsmith-cli-action@v2
      with:
        api-key: ${{ secrets.CLOUDSMITH_API_KEY }}

    - name: Push WebAssembly to Cloudsmith
      id: push
      if: github.ref == 'refs/heads/master' && github.repository == 'fotowall/fotowall'
      run: |
        cloudsmith push raw arntanguy/head "$GITHUB_WORKSPACE/build/fotowall-webassembly.tar.gz" \
          --tags "latest" \
          --name "fotowall-webassembly-latest.tar.gz" \
          --summary "Upload latest webassembly build" \
          --description "See https://github.com/cloudsmith-io/action" \
          --version "${{ github.sha }}" \
          --republish

    - name: Deploy to gh-pages 🚀
      if: github.ref == 'refs/heads/master' && github.repository == 'fotowall/fotowall'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build/fotowall-webassembly # The folder the action should deploy.
